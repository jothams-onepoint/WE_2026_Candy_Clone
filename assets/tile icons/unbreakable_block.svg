<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="st-face" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#6a6878"/>
      <stop offset="35%" stop-color="#4e4c5e"/>
      <stop offset="100%" stop-color="#2e2c3a"/>
    </linearGradient>
    <linearGradient id="st-sheen" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="st-iron" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a0a0b0"/>
      <stop offset="40%" stop-color="#707080"/>
      <stop offset="100%" stop-color="#404050"/>
    </linearGradient>
    <radialGradient id="st-rivet" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#d0d0e0"/>
      <stop offset="50%" stop-color="#888898"/>
      <stop offset="100%" stop-color="#404050"/>
    </radialGradient>
  </defs>

  <!-- Drop shadow -->
  <rect x="4" y="6" width="93" height="93" rx="7" fill="#0a0a14" opacity="0.6"/>

  <!-- Stone body -->
  <rect x="2" y="2" width="93" height="93" rx="7" fill="url(#st-face)"/>

  <!-- Top-left sheen -->
  <rect x="2" y="2" width="93" height="93" rx="7" fill="url(#st-sheen)"/>

  <!-- Stone colour variation patches — subtle, uneven -->
  <ellipse cx="28" cy="30" rx="18" ry="12" fill="#58566a" opacity="0.25"/>
  <ellipse cx="70" cy="65" rx="16" ry="11" fill="#3a3848" opacity="0.30"/>
  <ellipse cx="60" cy="22" rx="10" ry="7" fill="#626072" opacity="0.20"/>
  <ellipse cx="22" cy="72" rx="12" ry="8" fill="#524e62" opacity="0.22"/>

  <!-- Crack network — organic, asymmetric -->
  <path d="M18 12 L25 24 L22 30 L28 38" stroke="#1e1c2a" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <path d="M28 38 L32 42" stroke="#1e1c2a" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.35"/>
  <path d="M72 10 L68 20 L74 28 L70 35" stroke="#1e1c2a" stroke-width="1.1" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
  <path d="M10 55 L18 50 L22 58 L16 66 L20 74" stroke="#1e1c2a" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.50"/>
  <path d="M80 48 L76 56 L82 64 L78 72" stroke="#1e1c2a" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
  <path d="M40 80 L48 76 L54 82 L60 78 L66 84" stroke="#1e1c2a" stroke-width="1.1" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.40"/>
  <!-- fine hairline cracks -->
  <path d="M50 30 L55 38 L52 44" stroke="#1e1c2a" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.30"/>
  <path d="M35 60 L40 66 L36 72" stroke="#1e1c2a" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.28"/>

  <!-- Crack highlight edges (light side of each crack) -->
  <path d="M18 12 L25 24 L22 30 L28 38" stroke="#7a7888" stroke-width="0.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.30" transform="translate(0.8,-0.4)"/>
  <path d="M10 55 L18 50 L22 58 L16 66 L20 74" stroke="#7a7888" stroke-width="0.4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.25" transform="translate(0.8,-0.4)"/>

  <!-- Inner edge darkening -->
  <rect x="2" y="2" width="93" height="93" rx="7" fill="none" stroke="#0a0a14" stroke-width="7" opacity="0.40"/>

  <!-- ── IRON CORNER BRACKETS ── -->
  <!-- NW -->
  <path d="M2 2 L2 26 L9 26 L9 9 L26 9 L26 2 Z" fill="url(#st-iron)"/>
  <path d="M2 2 L2 26 L9 26 L9 9 L26 9 L26 2 Z" fill="none" stroke="#28283a" stroke-width="0.8" opacity="0.6"/>
  <!-- NE -->
  <path d="M95 2 L95 26 L88 26 L88 9 L71 9 L71 2 Z" fill="url(#st-iron)"/>
  <path d="M95 2 L95 26 L88 26 L88 9 L71 9 L71 2 Z" fill="none" stroke="#28283a" stroke-width="0.8" opacity="0.6"/>
  <!-- SW -->
  <path d="M2 95 L2 71 L9 71 L9 88 L26 88 L26 95 Z" fill="url(#st-iron)"/>
  <path d="M2 95 L2 71 L9 71 L9 88 L26 88 L26 95 Z" fill="none" stroke="#28283a" stroke-width="0.8" opacity="0.6"/>
  <!-- SE -->
  <path d="M95 95 L95 71 L88 71 L88 88 L71 88 L71 95 Z" fill="url(#st-iron)"/>
  <path d="M95 95 L95 71 L88 71 L88 88 L71 88 L71 95 Z" fill="none" stroke="#28283a" stroke-width="0.8" opacity="0.6"/>

  <!-- ── RIVETS ── -->
  <circle cx="14" cy="14" r="4.5" fill="url(#st-rivet)" stroke="#28283a" stroke-width="1"/>
  <circle cx="14" cy="14" r="1.5" fill="#28283a" opacity="0.5"/>
  <circle cx="83" cy="14" r="4.5" fill="url(#st-rivet)" stroke="#28283a" stroke-width="1"/>
  <circle cx="83" cy="14" r="1.5" fill="#28283a" opacity="0.5"/>
  <circle cx="14" cy="83" r="4.5" fill="url(#st-rivet)" stroke="#28283a" stroke-width="1"/>
  <circle cx="14" cy="83" r="1.5" fill="#28283a" opacity="0.5"/>
  <circle cx="83" cy="83" r="4.5" fill="url(#st-rivet)" stroke="#28283a" stroke-width="1"/>
  <circle cx="83" cy="83" r="1.5" fill="#28283a" opacity="0.5"/>

  <!-- Outer border -->
  <rect x="2" y="2" width="93" height="93" rx="7" fill="none" stroke="#0a0a14" stroke-width="1.5" opacity="0.8"/>
</svg>
