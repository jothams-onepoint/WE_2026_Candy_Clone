<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candy Clone</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <style>
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 10000;
      display: none;
    }
    #loading-overlay.active {
      display: block;
    }
  </style>
  <div id="loading-overlay" class="active"></div>
  <script>
    if (new URLSearchParams(window.location.search).has('autostart')) {
      document.getElementById('loading-overlay').classList.add('active');
    }
  </script>
  <canvas id="bg-canvas"></canvas>

  <!-- Main Menu -->
  <div id="main-menu">
    <img id="menu-settings" src="assets/menu elements/settings.png" alt="Settings">
    <img id="menu-play" src="assets/menu elements/play_button.png" alt="Play">
    <div id="menu-bottom-bar">
      <img class="menu-bottom-icon" src="assets/menu elements/quests.png" alt="Quests">
      <img class="menu-bottom-icon" src="assets/menu elements/Home.png" alt="Home">
      <img class="menu-bottom-icon" src="assets/menu elements/shop.png" alt="Shop">
    </div>
  </div>

  <!-- Objective Screen -->
  <div id="objective-screen" class="hidden">
    <div class="objective-card">
      <h2 id="objective-title">🎯 OBJECTIVE</h2>
      <div class="objective-content">
        <div class="objective-text" id="objective-description">Earn 500 points</div>
        <div class="objective-divider"></div>
        <div class="objective-rewards">
          <div class="reward-item">
            <span class="reward-emoji">💰</span>
            <span class="reward-label">Reward:</span>
            <span class="reward-amount" id="reward-coins">75 coins</span>
          </div>
          <div class="reward-item">
            <span class="reward-emoji">⭐</span>
            <span class="reward-label">Level Progress:</span>
            <span class="reward-amount" id="reward-progress">1 win</span>
          </div>
        </div>
        <button id="objective-start-btn" class="objective-btn">START GAME</button>
      </div>
    </div>
  </div>

  <div id="app" class="hidden">
    <div id="stopwatch-container">
      <canvas id="stopwatch-canvas" width="160" height="160"></canvas>
      <div id="time-text">2:00</div>
    </div>
    <div id="hud">
      <div class="hud-block">
        <span class="hud-label">SCORE</span>
        <span id="score-display">0</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">MOVES LEFT</span>
        <span id="moves-display">0</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">TIME</span>
        <span id="timer-display">40</span>
      </div>
    </div>
    <div id="game-grid"></div>
    <div id="booster-bar"></div>
  </div>

  <!-- Win Screen -->
  <div id="win-screen" class="hidden">
    <div class="es-bloom">
      <div class="es-ring win-ring"></div>
      <div class="es-ring win-ring win-ring-2"></div>
      <div class="es-ring win-ring win-ring-3"></div>
      <div class="es-particles">
        <div class="win-seed"></div>
        <div class="win-seed"></div>
        <div class="win-seed"></div>
        <div class="win-seed"></div>
        <div class="win-seed"></div>
        <div class="win-seed"></div>
        <div class="win-seed"></div>
        <div class="win-seed"></div>
        <div class="win-seed"></div>
        <div class="win-seed"></div>
        <div class="win-seed"></div>
        <div class="win-seed"></div>
      </div>
    </div>
    <div class="es-card win-card">
      <div class="win-trophy">🏆</div>
      <div class="win-badge">LEVEL COMPLETE</div>
      <h1 class="win-headline">YOU WIN!</h1>
      <div class="win-stars">
        <span class="win-star">⭐</span>
        <span class="win-star">⭐</span>
        <span class="win-star">⭐</span>
      </div>
      <div class="win-stats-row">
        <div class="win-stat">
          <div class="win-stat-label">SCORE</div>
          <div class="win-stat-value" id="win-score">0</div>
        </div>
        <div class="win-stat-sep"></div>
        <div class="win-stat">
          <div class="win-stat-label">COINS</div>
          <div class="win-coins-val win-stat-value" id="win-coins">0</div>
        </div>
      </div>
      <button id="win-menu-btn" class="win-go-btn">🏠 BACK TO MENU</button>
    </div>
  </div>

  <!-- Loss Screen -->
  <div id="loss-screen" class="hidden">
    <div class="es-bloom">
      <div class="es-ring loss-ring"></div>
      <div class="es-ring loss-ring loss-ring-2"></div>
      <div class="es-particles">
        <div class="loss-frag"></div>
        <div class="loss-frag"></div>
        <div class="loss-frag"></div>
        <div class="loss-frag"></div>
        <div class="loss-frag"></div>
        <div class="loss-frag"></div>
        <div class="loss-frag"></div>
        <div class="loss-frag"></div>
      </div>
    </div>
    <div class="es-card loss-card">
      <div class="loss-skull">💀</div>
      <p class="es-eyebrow loss-eyebrow" id="loss-eyebrow">No moves left</p>
      <h1 class="loss-headline">GAME OVER</h1>
      <div class="loss-score-block">
        <div class="loss-stat-label">YOUR SCORE</div>
        <div class="loss-stat-value" id="loss-score">0</div>
      </div>
      <div id="loss-extra-life" class="hidden"></div>
      <button id="retry-btn">🔄 TRY AGAIN</button>
      <button id="loss-menu-btn" class="menu-btn-link">← BACK TO MENU</button>
    </div>
  </div>

  <script src="dist/backgrounds.js"></script>
  <script src="dist/game.js"></script>
</body>
</html>
