<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candy Clone</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <!-- Main Menu -->
  <div id="main-menu">
    <img id="menu-settings" src="assets/menu elements/settings.png" alt="Settings">
    <img id="menu-play" src="assets/menu elements/play_button.png" alt="Play">
    <div id="menu-bottom-bar">
      <img class="menu-bottom-icon" src="assets/menu elements/quests.png" alt="Quests">
      <img class="menu-bottom-icon" src="assets/menu elements/Home.png" alt="Home">
      <img class="menu-bottom-icon" src="assets/menu elements/shop.png" alt="Shop">
    </div>
  </div>

  <!-- Objective Screen -->
  <div id="objective-screen" class="hidden">
    <div class="objective-card">
      <h2 id="objective-title">🎯 OBJECTIVE</h2>
      <div class="objective-content">
        <div class="objective-text" id="objective-description">Earn 500 points</div>
        <div class="objective-divider"></div>
        <div class="objective-rewards">
          <div class="reward-item">
            <span class="reward-emoji">💰</span>
            <span class="reward-label">Reward:</span>
            <span class="reward-amount" id="reward-coins">75 coins</span>
          </div>
          <div class="reward-item">
            <span class="reward-emoji">⭐</span>
            <span class="reward-label">Level Progress:</span>
            <span class="reward-amount" id="reward-progress">1 win</span>
          </div>
        </div>
        <button id="objective-start-btn" class="objective-btn">START GAME</button>
      </div>
    </div>
  </div>

  <div id="app" class="hidden">
    <div id="hud">
      <div class="hud-block">
        <span class="hud-label">SCORE</span>
        <span id="score-display">0</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">MOVES LEFT</span>
        <span id="moves-display">0</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">TIME</span>
        <span id="timer-display">40</span>
      </div>
    </div>
    <div id="game-grid"></div>
    <div id="booster-bar"></div>
  </div>

  <!-- Win Screen -->
  <div id="win-screen" class="hidden">
    <div class="es-bloom">
      <div class="es-ring win-ring"></div>
      <div class="es-ring win-ring win-ring-2"></div>
      <div class="es-particles">
        <div class="win-seed"></div>
        <div class="win-seed"></div>
        <div class="win-seed"></div>
        <div class="win-seed"></div>
        <div class="win-seed"></div>
        <div class="win-seed"></div>
      </div>
    </div>
    <div class="es-card win-card">
      <p class="es-eyebrow win-eyebrow">Level complete</p>
      <h1 class="es-headline">You Win.</h1>
      <div class="es-rule">
        <div class="es-rule-line"></div>
        <div class="es-rule-dot win-dot"></div>
        <div class="es-rule-line"></div>
      </div>
      <p class="es-score-label">Score</p>
      <p class="es-score-value" id="win-score">0</p>
      <p class="es-score-label" style="margin-top: 16px;">Coins Earned</p>
      <p class="es-score-value" style="color: #f0c040;" id="win-coins">0</p>
      <button id="win-menu-btn" class="menu-btn-link">Back to menu</button>
    </div>
  </div>

  <!-- Loss Screen -->
  <div id="loss-screen" class="hidden">
    <div class="es-bloom">
      <div class="es-ring loss-ring"></div>
      <div class="es-ring loss-ring loss-ring-2"></div>
      <div class="es-particles">
        <div class="loss-frag"></div>
        <div class="loss-frag"></div>
        <div class="loss-frag"></div>
        <div class="loss-frag"></div>
        <div class="loss-frag"></div>
        <div class="loss-frag"></div>
      </div>
    </div>
    <div class="es-card loss-card">
      <p class="es-eyebrow loss-eyebrow">No moves left</p>
      <h1 class="es-headline">You Lost.</h1>
      <div class="es-rule">
        <div class="es-rule-line"></div>
        <div class="es-rule-dot loss-dot"></div>
        <div class="es-rule-line"></div>
      </div>
      <p class="es-score-label">Score</p>
      <p class="es-score-value" id="loss-score">0</p>
      <button id="retry-btn">Retry?</button>
      <button id="loss-menu-btn" class="menu-btn-link">Back to menu</button>
    </div>
  </div>

  <script src="dist/game.js"></script>
</body>
</html>
