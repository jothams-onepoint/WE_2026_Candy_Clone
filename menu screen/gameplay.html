<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candy Clone – Gameplay</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Fredoka', 'Comic Sans MS', sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
    }

    #gameplay-screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .gameplay-content {
      position: relative;
      width: min(100vw, 56.25vh);
      height: min(100vh, 177.78vw);
      background: linear-gradient(135deg, #1e5a2c 0%, #2d7a3e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      overflow: hidden;
    }

    .float-item {
      position: absolute;
      pointer-events: none;
      opacity: 0.6;
      z-index: 1;
    }

    .float-item.butterfly { animation: flutter 3s infinite ease-in-out; }
    .float-item.sparkle { animation: sparkle-float 4s infinite ease-in-out; }

    .float-item.butterfly::before { content: '🦋'; font-size: 30px; }
    .float-item.sparkle::before { content: '✨'; font-size: 20px; animation: twinkle 1s infinite; }

    @keyframes flutter {
      0%, 100% { transform: translateX(0) translateY(0) rotateZ(0deg); }
      25% { transform: translateX(15px) translateY(-20px) rotateZ(10deg); }
      50% { transform: translateX(0) translateY(0) rotateZ(0deg); }
      75% { transform: translateX(-15px) translateY(-20px) rotateZ(-10deg); }
    }

    @keyframes sparkle-float {
      0%, 100% { transform: translateX(0) translateY(0); }
      25% { transform: translateX(10px) translateY(-10px); }
      50% { transform: translateX(0) translateY(0); }
      75% { transform: translateX(-10px) translateY(-10px); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .float-item.bird { animation: bird-fly 16s infinite ease-in-out; }
    .float-item.bird::before { content: '🐦'; font-size: 28px; }

    .float-item.flower { animation: flower-sway 5s infinite ease-in-out; }
    .float-item.flower::before { content: '🌸'; font-size: 32px; }

    .float-item.star { animation: star-twirl 6s infinite ease-in-out; }
    .float-item.star::before { content: '⭐'; font-size: 24px; animation: twinkle 1.5s infinite; }

    @keyframes bird-fly {
      0%, 100% { transform: translateX(0) translateY(0); }
      33% { transform: translateX(50px) translateY(-25px); }
      66% { transform: translateX(-30px) translateY(15px); }
    }

    @keyframes flower-sway {
      0%, 100% { transform: rotateZ(0deg) translateY(0); }
      50% { transform: rotateZ(5deg) translateY(-5px); }
    }

    @keyframes star-twirl {
      0%, 100% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.1); }
    }

    .float-item.leaf { animation: leaf-fall 8s infinite ease-in; }
    .float-item.leaf::before { content: '🍃'; font-size: 26px; }

    .float-item.bee { animation: bee-buzz 4s infinite ease-in-out; }
    .float-item.bee::before { content: '🐝'; font-size: 24px; }

    @keyframes leaf-fall {
      0% { transform: translateY(0) translateX(0) rotateZ(0deg); }
      25% { transform: translateY(20px) translateX(10px) rotateZ(15deg); }
      50% { transform: translateY(40px) translateX(0) rotateZ(-15deg); }
      75% { transform: translateY(60px) translateX(-10px) rotateZ(15deg); }
      100% { transform: translateY(80px) translateX(0) rotateZ(0deg); }
    }

    h1 {
      color: #fff;
      font-size: 32px;
      text-align: center;
      font-weight: 700;
    }

    .gameplay-placeholder {
      color: #fff;
      font-size: 14px;
      text-align: center;
      max-width: 80%;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.3);
      padding: 12px;
      border-radius: 6px;
    }

    .back-button {
      padding: 12px 24px;
      margin-top: 16px;
      background: #1e5a8a;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .back-button:hover {
      background: #155080;
    }

    .back-button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div id="gameplay-screen">
    <div class="gameplay-content">
      <div class="float-item sparkle draggable-item" style="top: 60%; right: 20%;"></div>
      <div class="float-item sparkle draggable-item" style="top: 30%; right: 10%; animation-delay: 1s;"></div>
      <div class="float-item sparkle draggable-item" style="top: 80%; right: 15%; animation-delay: 2.5s;"></div>

      <div class="float-item bird draggable-item" style="top: 40%; right: 10%; animation-delay: 1.2s;"></div>

      <div class="float-item leaf draggable-item" style="top: 45%; right: 25%; animation-delay: 0.5s;"></div>
      <div class="float-item leaf draggable-item" style="top: 75%; right: 18%; animation-delay: 2.8s;"></div>

      <div class="float-item bee draggable-item" style="top: 35%; right: 15%; animation-delay: 1.5s;"></div>

      <h1>GAMEPLAY</h1>
      <div class="gameplay-placeholder">
        <p>PLACEHOLDER THING 1</p>
        <p style="margin-top: 12px;">PLACEHOLDER THING 2</p>
      </div>
      <button class="back-button" onclick="playClick()">BACK</button>
    </div>
  </div>
  <script>
    const clickSound = new Audio('../assets/Sounds/pop.mp3');
    function playClick() {
      clickSound.currentTime = 0;
      clickSound.play().catch(() => {});
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
