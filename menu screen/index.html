<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candy Clone – Menu</title>
  <link rel="stylesheet" href="menu.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="menu-screen">
    <div class="menu-content">

      <!-- Floating elements -->
      <div class="float-item cloud" style="top: 15%; right: 10%; animation-delay: 0s;"></div>
      <div class="float-item cloud" style="top: 70%; right: 15%; animation-delay: 3s; animation-duration: 20s;"></div>
      <div class="float-item cloud" style="top: 40%; right: 5%; animation-delay: 6s; animation-duration: 25s;"></div>

      <div class="float-item sparkle draggable-item" style="top: 40%; right: 30%; animation-delay: 0.5s;"></div>
      <div class="float-item sparkle draggable-item" style="top: 50%; right: 20%; animation-delay: 2s;"></div>
      <div class="float-item sparkle draggable-item" style="top: 20%; right: 25%; animation-delay: 1.5s;"></div>
      <div class="float-item sparkle draggable-item" style="top: 80%; right: 32%; animation-delay: 3s;"></div>

      <div class="float-item bird draggable-item" style="top: 35%; right: 35%; animation-delay: 0.8s;"></div>
      <div class="float-item bird draggable-item" style="top: 55%; right: 8%; animation-delay: 2.2s; animation-duration: 16s;"></div>

      <div class="float-item star draggable-item" style="top: 30%; right: 30%; animation-delay: 0.3s;"></div>
      <div class="float-item star draggable-item" style="top: 65%; right: 38%; animation-delay: 2.8s;"></div>
      <div class="float-item star draggable-item" style="top: 50%; right: 45%; animation-delay: 1.6s;"></div>

      <div class="float-item leaf draggable-item" style="top: 55%; right: 50%; animation-delay: 0.2s;"></div>
      <div class="float-item leaf draggable-item" style="top: 35%; right: 40%; animation-delay: 1.8s;"></div>
      <div class="float-item leaf draggable-item" style="top: 80%; right: 10%; animation-delay: 3.2s;"></div>

      <div class="float-item bee draggable-item" style="top: 45%; right: 35%; animation-delay: 0.7s;"></div>
      <div class="float-item bee draggable-item" style="top: 70%; right: 48%; animation-delay: 2.5s;"></div>

      <div class="float-item cloud" style="top: 15%; right: 10%; animation-delay: 0s;"></div>
      <div class="float-item cloud" style="top: 70%; right: 15%; animation-delay: 3s; animation-duration: 20s;"></div>
      <div class="float-item cloud" style="top: 40%; right: 5%; animation-delay: 6s; animation-duration: 25s;"></div>

      <!-- Level display + progress – top-left -->
      <div id="level-info-display">
        <div class="level-info-header">LEVEL</div>
        <div id="level-number-display">1</div>
        <div id="level-progress-bar-container">
          <div id="level-progress-bar">
            <div id="level-progress-fill"></div>
          </div>
        </div>
      </div>

      <!-- Settings – top-right -->
      <img id="btn-settings" class="menu-btn" draggable="false" alt="Settings">

      <!-- Play – centred -->
      <div id="play-container">
        <button id="btn-play" class="play-btn-new" aria-label="Play">
          <svg viewBox="0 0 120 120" class="play-btn-circle">
            <defs>
              <radialGradient id="playGradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" style="stop-color:#7af0b0;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#4a9d52;stop-opacity:1" />
              </radialGradient>
              <filter id="playGlow">
                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                <feMerge>
                  <feMergeNode in="coloredBlur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
            </defs>
            <!-- Pulsing background circle -->
            <circle cx="60" cy="60" r="55" fill="url(#playGradient)" class="play-pulse"/>
            <!-- Decorative ring -->
            <circle cx="60" cy="60" r="55" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
            <!-- Play triangle -->
            <polygon points="50,35 50,85 85,60" fill="#fff" class="play-triangle"/>
          </svg>
        </button>
      </div>

      <!-- Bottom bar: Quests · Home · Shop -->
      <div id="bottom-bar">
        <img id="btn-quests" class="menu-btn icon-btn" draggable="false" alt="Quests">
        <img id="btn-home"   class="menu-btn icon-btn" draggable="false" alt="Home">
        <img id="btn-shop"   class="menu-btn icon-btn" draggable="false" alt="Shop">
      </div>

    </div>
  </div>

  <!-- Quests Popup -->
  <div id="popup-quests" class="popup">
    <div class="popup-content">
      <h2>📜 QUESTS</h2>
      <div class="popup-body" id="quests-container">
        <!-- Populated by JavaScript -->
      </div>
      <button class="popup-close">✕ CLOSE</button>
    </div>
  </div>

  <!-- Settings Popup -->
  <div id="popup-settings" class="popup">
    <div class="popup-content">
      <h2>⚙️ SETTINGS</h2>
      <div class="popup-body">
        <div class="setting-item" style="background: linear-gradient(135deg, #e6ffe6 0%, #f0fff0 100%);">
          <label>🔊 SFX</label>
          <input type="checkbox" id="sound-toggle" checked>
        </div>
        <div class="setting-item" style="background: linear-gradient(135deg, #e6f5ff 0%, #f0f8ff 100%);">
          <label>🎵 MUSIC</label>
          <input type="checkbox" id="music-toggle" checked>
        </div>
        <div class="setting-item" style="background: linear-gradient(135deg, #fff9e6 0%, #fffaf0 100%);">
          <label>⚡ BOOST</label>
        </div>
      </div>
      <button class="popup-close">✕ CLOSE</button>
    </div>
  </div>

  <!-- Level Info Popup -->
  <div id="popup-level" class="popup">
    <div class="popup-content">
      <h2>📊 LEVEL INFO</h2>
      <div class="popup-body">
        <div style="text-align: center; padding: 20px 0;">
          <div style="font-size: 48px; font-weight: 900; color: #f0c040; margin-bottom: 12px;" id="level-number-popup">5</div>
          <div style="font-size: 16px; color: #666; margin-bottom: 20px;">Current Level</div>
          <div style="background: #e0e0e0; height: 20px; border-radius: 10px; overflow: hidden; margin-bottom: 12px;">
            <div id="level-progress-bar" style="height: 100%; background: linear-gradient(90deg, #4a9d52 0%, #2d7a3e 100%); width: 60%; transition: width 0.3s ease;"></div>
          </div>
          <div style="font-size: 14px; font-weight: 600; color: #333; margin-bottom: 16px;">
            <span id="wins-until-level">2</span> wins until Level 6
          </div>
          <div style="font-size: 12px; color: #999; font-style: italic;">Click Play to level up!</div>
        </div>
      </div>
      <button class="popup-close">✕ CLOSE</button>
    </div>
  </div>

  <!-- Difficulty Selector -->
  <div id="popup-difficulty" class="popup">
    <div class="popup-content difficulty-modal">
      <h2>⏱️ SELECT DIFFICULTY</h2>
      <div class="popup-body difficulty-body">
        <button class="difficulty-btn easy-btn" data-difficulty="easy">
          <div class="difficulty-emoji">🟢</div>
          <div class="difficulty-name">EASY</div>
          <div class="difficulty-time">120 seconds</div>
        </button>
        <button class="difficulty-btn medium-btn" data-difficulty="medium">
          <div class="difficulty-emoji">🟡</div>
          <div class="difficulty-name">MEDIUM</div>
          <div class="difficulty-time">90 seconds</div>
        </button>
        <button class="difficulty-btn hard-btn" data-difficulty="hard">
          <div class="difficulty-emoji">🔴</div>
          <div class="difficulty-name">HARD</div>
          <div class="difficulty-time">60 seconds</div>
        </button>
      </div>
    </div>
  </div>

  <!-- Level Info Popup -->
  <div id="popup-level-info" class="popup">
    <div class="popup-content">
      <h2>📊 LEVEL PROGRESS</h2>
      <div class="popup-body">
        <div style="text-align: center; padding: 20px 0;">
          <div style="font-size: clamp(36px, 6vmin, 56px); font-weight: 900; color: #7af0b0; margin-bottom: 12px; text-shadow: 0 0 16px rgba(122, 240, 176, 0.5);" id="level-popup-number">1</div>
          <div style="font-size: clamp(14px, 2.5vmin, 18px); color: #666; margin-bottom: 24px;">Current Level</div>
          <div style="background: #e0e0e0; height: 20px; border-radius: 10px; overflow: hidden; margin-bottom: 16px;">
            <div id="level-popup-progress" style="height: 100%; background: linear-gradient(90deg, #7af0b0 0%, #4a9d52 100%); width: 0%; transition: width 0.3s ease;"></div>
          </div>
          <div style="font-size: clamp(13px, 2.3vmin, 16px); font-weight: 700; color: #333; margin-bottom: 8px;">
            <span id="level-popup-wins">0</span>/3 wins until Level <span id="level-popup-next">2</span>
          </div>
          <div style="font-size: 12px; color: #999; font-style: italic;">Click Play to win games and level up!</div>
          <div style="margin-top: 20px; padding-top: 20px; border-top: 2px solid #ddd; font-size: clamp(12px, 2vmin, 14px); color: #333; line-height: 1.6;" id="level-popup-rewards"></div>
        </div>
      </div>
      <button class="popup-close">✕ CLOSE</button>
    </div>
  </div>

  <script src="../dist/backgrounds.js"></script>
  <script src="menu.js"></script>
</body>
</html>
