<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candy Clone – Menu</title>
  <link rel="stylesheet" href="menu.css">
</head>
<body>
  <div id="menu-screen">
    <div class="menu-content">

      <!-- Floating elements -->
      <div class="float-item cloud" style="top: 15%; left: 10%; animation-delay: 0s;"></div>
      <div class="float-item cloud" style="top: 70%; right: 15%; animation-delay: 3s; animation-duration: 20s;"></div>
      <div class="float-item butterfly" style="top: 25%; right: 5%; animation-delay: 1s;"></div>
      <div class="float-item butterfly" style="top: 60%; left: 8%; animation-delay: 4s; animation-duration: 12s;"></div>
      <div class="float-item sparkle" style="top: 40%; left: 20%; animation-delay: 0.5s;"></div>
      <div class="float-item sparkle" style="top: 50%; right: 20%; animation-delay: 2s;"></div>

      <!-- Settings – top-right -->
      <img id="btn-settings" class="menu-btn" draggable="false" alt="Settings">

      <!-- Play – centred -->
      <div id="play-container">
        <img id="btn-play" class="menu-btn" draggable="false" alt="Play">
      </div>

      <!-- Bottom bar: Quests · Home · Shop -->
      <div id="bottom-bar">
        <img id="btn-quests" class="menu-btn icon-btn" draggable="false" alt="Quests">
        <img id="btn-home"   class="menu-btn icon-btn" draggable="false" alt="Home">
        <img id="btn-shop"   class="menu-btn icon-btn" draggable="false" alt="Shop">
      </div>

    </div>
  </div>

  <!-- Quests Popup -->
  <div id="popup-quests" class="popup">
    <div class="popup-content">
      <h2>📜 QUESTS</h2>
      <div class="popup-body">
        <div class="quest-item" style="background: #fff9e6; border-color: #f4a460;">
          <h3>🎯 THING 1</h3>
          <p>Do some stuff</p>
        </div>
        <div class="quest-item" style="background: #e6f5ff; border-color: #87ceeb;">
          <h3>🎯 THING 2</h3>
          <p>Do more stuff</p>
        </div>
        <div class="quest-item" style="background: #e6ffe6; border-color: #90ee90;">
          <h3>🎯 THING 3</h3>
          <p>Complete a thing</p>
        </div>
      </div>
      <button class="popup-close">✕ CLOSE</button>
    </div>
  </div>

  <!-- Settings Popup -->
  <div id="popup-settings" class="popup">
    <div class="popup-content">
      <h2>⚙️ SETTINGS</h2>
      <div class="popup-body">
        <div class="setting-item" style="background: linear-gradient(135deg, #e6ffe6 0%, #f0fff0 100%);">
          <label>🔊 SOUND</label>
          <input type="checkbox" checked>
        </div>
        <div class="setting-item" style="background: linear-gradient(135deg, #e6f5ff 0%, #f0f8ff 100%);">
          <label>🎵 MUSIC</label>
          <input type="checkbox" checked>
        </div>
        <div class="setting-item" style="background: linear-gradient(135deg, #fff9e6 0%, #fffaf0 100%);">
          <label>⚡ BOOST</label>
        </div>
      </div>
      <button class="popup-close">✕ CLOSE</button>
    </div>
  </div>

  <script src="menu.js"></script>
</body>
</html>
